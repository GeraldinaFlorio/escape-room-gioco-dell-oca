<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Digitale - Gioco dell'Inclusione Numerato</title>
    <style>
        :root {
            --color-1: #FFB7B2;
            --color-2: #FFDAC1;
            --color-3: #E2F0CB;
            --color-4: #B5EAD7;
            --color-5: #C7CEEA;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #7cfc00 0%, #228b22 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 { 
            color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }

        #game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 130px);
            grid-template-rows: repeat(5, 130px);
            gap: 12px;
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 25px;
            backdrop-filter: blur(5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .cell {
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            text-align: center;
            padding: 10px;
            position: relative;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Numerazione della casella */
        .cell-number {
            position: absolute;
            top: 5px;
            left: 8px;
            font-weight: bold;
            font-size: 1rem;
            color: #2c3e50;
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 50%;
        }

        .cell b { font-size: 0.85rem; display: block; margin-top: 10px; margin-bottom: 5px; color: #2c3e50; }
        .cell i { font-size: 0.7rem; color: #555; display: block; margin-top: auto; border-top: 1px solid #ddd; padding-top: 5px; }

        .cell-0 { background-color: var(--color-3) !important; border: 3px solid #4CAF50; }
        .cell-final { background-color: var(--color-5) !important; border: 3px solid #673AB7; }
        .cell-special { background-color: var(--color-2) !important; }

        .player {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            z-index: 10;
        }

        #controls {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }

        button {
            background-color: #ff9f43;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,159,67,0.4);
            transition: all 0.2s;
        }

        button:hover { background-color: #ee5253; transform: scale(1.05); }

        #dice-result { font-size: 4rem; margin: 15px 0; }
        #timer, #turn-info {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .p1 { background-color: #ff6b6b; left: 15%; top: 15%; }
        .p2 { background-color: #4ecdc4; right: 15%; top: 15%; }
        .p3 { background-color: #feca57; left: 15%; bottom: 15%; }
        .p4 { background-color: #54a0ff; right: 15%; bottom: 15%; }
    </style>
</head>
<body>

    <h1>Diario Digitale: Il Gioco dell'Oca Numerato</h1>
    
    <div id="game-container">
        <div id="board"></div>

        <div id="controls">
            <div id="timer">⏱️ Tempo: 00:00</div>
            <div id="turn-info">Tocca al Giocatore 1</div>
            <div id="dice-result">🎲</div>
            <button onclick="rollDice()">TIRA IL DADO</button>
            <div id="message" style="margin-top:20px; font-weight: 500; color: #2e7d32; min-height: 40px;"></div>
        </div>
    </div>

    <script>
        const spiralContent = [
            { t: "Partenza", a: "Inizio rotazione settimanale (Lunedì)." },
            { t: "Inquadramento", a: "Analisi pedagogica del contesto classe." },
            { t: "Pausa Regolativa", a: "Passeggiata in corridoio per relax." },
            { t: "Saluto Sociale", a: "Interazione minima con compagni/personale." },
            { t: "Adesione Docenti", a: "Coordinamento con docente di Italiano." },
            { t: "Contenuti Interattivi", a: "Studio delle strategie di rinforzo." },
            { t: "Supporto Audio", a: "Ascolto istruzioni compilazione diario." },
            { t: "Attività Motoria", a: "Raggiungi il compagno in palestra." },
            { t: "Monitoraggio Tempo", a: "Uso del timer per sessione di 10 min." },
            { t: "Mappa Mentale", a: "Visualizzazione struttura dell'inclusione." },
            { t: "Gestione Crisi", a: "Supporto durante crisi comportamentali." },
            { t: "Diario Operativo", a: "Registrazione attività e luoghi svolti." },
            { t: "Supporto Video", a: "Studio dei processi cognitivi linearizzati." },
            { t: "Narrazione Immagini", a: "Creazione di un fumetto dell'attività." },
            { t: "Spazio Esterno", a: "Interazione sociale in cortile." },
            { t: "Auto-osservazione", a: "Riflessione sulle emozioni provate." },
            { t: "Bacheca Feedback", a: "Condivisione apprendimenti sociali." },
            { t: "Analisi Quantitativa", a: "Verifica tempi di permanenza su Excel." },
            { t: "Sintesi Risultati", a: "Analisi dati finali del benessere." },
            { t: "Traguardo", a: "Inclusione Realizzata con Successo!" }
        ];

        // Percorso a spirale 5x5
        const spiralPath = [0, 1, 2, 3, 4, 9, 14, 19, 24, 23, 22, 21, 20, 15, 10, 5, 6, 7, 8, 13, 18, 17, 12, 11, 16];

        let playerPositions = [0, 0, 0, 0];
        let currentPlayer = 0;
        let timerStarted = false;
        let seconds = 0;
        let timerInterval;

        const board = document.getElementById('board');
        const cellsArray = new Array(25).fill(null);

        spiralContent.forEach((data, i) => {
            const gridIndex = spiralPath[i];
            const cell = document.createElement('div');
            cell.className = `cell cell-${i}`;
            if(i === 0) cell.classList.add('cell-0');
            if(i === 19) cell.classList.add('cell-final');
            if([4, 8, 12, 16].includes(i)) cell.classList.add('cell-special');
            
            // Aggiunta del numero della casella
            cell.innerHTML = `
                <div class="cell-number">${i + 1}</div>
                <b>${data.t}</b>
                <i>${data.a}</i>
            `;
            cell.id = `cell-${i}`;
            cellsArray[gridIndex] = cell;
        });

        for(let i=0; i<25; i++) {
            if(cellsArray[i]) board.appendChild(cellsArray[i]);
            else board.appendChild(document.createElement('div'));
        }

        const players = ['p1', 'p2', 'p3', 'p4'];
        players.forEach((p, idx) => {
            const dot = document.createElement('div');
            dot.className = `player ${p}`;
            dot.id = `player-${idx}`;
            document.getElementById('cell-0').appendChild(dot);
        });

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                let min = Math.floor(seconds / 60).toString().padStart(2, '0');
                let sec = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `⏱️ Tempo: ${min}:${sec}`;
            }, 1000);
        }

        function rollDice() {
            if (!timerStarted) { startTimer(); timerStarted = true; }
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][roll];
            movePlayer(currentPlayer, roll);
        }

        function movePlayer(playerIdx, steps) {
            let oldPos = playerPositions[playerIdx];
            let newPos = oldPos + steps;

            if (newPos >= 19) {
                newPos = 19;
                playerPositions[playerIdx] = newPos;
                updatePawn(playerIdx, newPos);
                setTimeout(() => {
                    alert(`VITTORIA! Il Giocatore ${playerIdx + 1} ha raggiunto l'Inclusione!`);
                    clearInterval(timerInterval);
                }, 400);
                return;
            }

            playerPositions[playerIdx] = newPos;
            updatePawn(playerIdx, newPos);
            document.getElementById('message').innerText = `Attività Casella ${newPos+1}: ${spiralContent[newPos].a}`;

            currentPlayer = (currentPlayer + 1) % 4;
            document.getElementById('turn-info').innerText = `Tocca al Giocatore ${currentPlayer + 1}`;
            document.getElementById('turn-info').style.borderBottom = `4px solid ${['#ff6b6b','#4ecdc4','#feca57','#54a0ff'][currentPlayer]}`;
        }

        function updatePawn(playerIdx, pos) {
            const playerElement = document.getElementById(`player-${playerIdx}`);
            document.getElementById(`cell-${pos}`).appendChild(playerElement);
        }
    </script>
</body>
</html>
