<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Digitale - Il Gioco dell'Inclusione</title>
    <style>
        :root {
            --color-1: #FFB7B2;
            --color-2: #FFDAC1;
            --color-3: #E2F0CB;
            --color-4: #B5EAD7;
            --color-5: #C7CEEA;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Sfondo prato verde */
            background: radial-gradient(circle, #7cfc00 0%, #228b22 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 { 
            color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }

        #game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        /* Griglia per spirale */
        #board {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            grid-template-rows: repeat(5, 120px);
            gap: 10px;
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .cell {
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            text-align: center;
            padding: 8px;
            position: relative;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border: 2px solid white;
        }

        .cell b { font-size: 0.8rem; display: block; margin-bottom: 4px; color: #2c3e50; }
        .cell i { font-size: 0.65rem; color: #666; display: block; margin-top: 4px; border-top: 1px solid #eee; padding-top: 4px; }

        .cell-0 { background-color: var(--color-3) !important; font-weight: bold; border: 3px solid #4CAF50; }
        .cell-special { background-color: var(--color-2) !important; }
        .cell-final { background-color: var(--color-5) !important; font-weight: bold; border: 3px solid #673AB7; }

        .player {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #controls {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 280px;
            text-align: center;
        }

        button {
            background-color: #ff9f43;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,159,67,0.4);
            transition: all 0.2s;
        }

        button:hover { background-color: #ee5253; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        #dice-result { font-size: 4rem; margin: 15px 0; }
        #timer, #turn-info {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .p1 { background-color: #ff6b6b; left: 10%; top: 10%; }
        .p2 { background-color: #4ecdc4; right: 10%; top: 10%; }
        .p3 { background-color: #feca57; left: 10%; bottom: 10%; }
        .p4 { background-color: #54a0ff; right: 10%; bottom: 10%; }
    </style>
</head>
<body>

    <h1>Diario Digitale: Il Gioco dell'Inclusione</h1>
    
    <div id="game-container">
        <div id="board">
            </div>

        <div id="controls">
            <div id="timer">⏱️ Tempo: 00:00</div>
            <div id="turn-info">Tocca al Compagno Tutor 1</div>
            <div id="dice-result">🎲</div>
            <button onclick="rollDice()">TIRA IL DADO</button>
            <div id="message" style="margin-top:20px; font-weight: 500; color: #2e7d32;"></div>
        </div>
    </div>

    <script>
        // Mappa dei contenuti: Titolo + Attività suggerita
        const spiralContent = [
            { t: "Partenza", a: "Lunedì: Inizio della rotazione settimanale." },
            { t: "Inquadramento", a: "Analizza la mappa dei principi pedagogici." },
            { t: "Pausa Regolativa", a: "Percorri il corridoio per la regolazione emotiva." },
            { t: "Saluto Sociale", a: "Saluta tre persone incontrate nel corridoio." },
            { t: "Adesione Docenti", a: "Pianifica l'intervento con i docenti curricolari." },
            { t: "Contenuti Interattivi", a: "Esplora l'immagine interattiva dei rinforzi." },
            { t: "Supporto Audio", a: "Ascolta le istruzioni vocali per la compilazione." },
            { t: "Attività Motoria", a: "Raggiungi il compagno in palestra." },
            { t: "Monitoraggio Tempo", a: "Attiva il timer: l'obiettivo è restare 10 min." },
            { t: "Mappa Mentale", a: "Visualizza i nodi dell'analisi del gruppo classe." },
            { t: "Gestione Crisi", a: "Applica le strategie di de-escalation apprese." },
            { t: "Diario Operativo", a: "Registra l'attività svolta nella sezione dedicata." },
            { t: "Supporto Video", a: "Guarda il tutorial sui processi cognitivi." },
            { t: "Narrazione Immagini", a: "Crea un breve fumetto dell'interazione odierna." },
            { t: "Spazio Esterno", a: "Svolgi l'attività di interazione in cortile." },
            { t: "Auto-osservazione", a: "Cerca di capire come ti sei sentito oggi." },
            { t: "Bacheca Feedback", a: "Inserisci una proposta migliorativa per il progetto." },
            { t: "Analisi Dati", a: "Confronta i minuti di permanenza con i dati Excel." },
            { t: "Sintesi Risultati", a: "Genera un grafico del benessere emotivo." },
            { t: "Inclusione Realizzata", a: "Traguardo: Analisi qualitativa completata!" }
        ];

        // Coordinate per mappare una spirale 5x5 (indici della griglia 0-24)
        const spiralPath = [
            0, 1, 2, 3, 4,
            9, 14, 19, 24, 23,
            22, 21, 20, 15, 10,
            5, 6, 7, 8, 13,
            18, 17, 12, 11, 16
        ];

        let playerPositions = [0, 0, 0, 0];
        let currentPlayer = 0;
        let timerStarted = false;
        let seconds = 0;
        let timerInterval;

        // Inizializzazione board
        const board = document.getElementById('board');
        const cellsArray = new Array(25).fill(null);

        // Prepariamo le celle nella posizione corretta della spirale
        spiralContent.forEach((data, i) => {
            const gridIndex = spiralPath[i];
            const cell = document.createElement('div');
            cell.className = `cell cell-${i}`;
            if(i === 0) cell.classList.add('cell-0');
            if(i === 19) cell.classList.add('cell-final');
            if([5, 8, 11, 14, 17].includes(i)) cell.classList.add('cell-special');
            
            cell.innerHTML = `<b>${data.t}</b><i>${data.a}</i>`;
            cell.id = `cell-${i}`;
            cellsArray[gridIndex] = cell;
        });

        // Riempiamo la griglia HTML rispettando l'ordine CSS Grid
        for(let i=0; i<25; i++) {
            if(cellsArray[i]) {
                board.appendChild(cellsArray[i]);
            } else {
                const empty = document.createElement('div');
                board.appendChild(empty); // Spazi vuoti per la spirale incompleta
            }
        }

        // Posizionamento iniziale pedine
        const players = ['p1', 'p2', 'p3', 'p4'];
        players.forEach((p, idx) => {
            const dot = document.createElement('div');
            dot.className = `player ${p}`;
            dot.id = `player-${idx}`;
            document.getElementById('cell-0').appendChild(dot);
        });

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                let min = Math.floor(seconds / 60).toString().padStart(2, '0');
                let sec = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `⏱️ Tempo: ${min}:${sec}`;
            }, 1000);
        }

        function rollDice() {
            if (!timerStarted) {
                startTimer();
                timerStarted = true;
            }

            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = getDiceEmoji(roll);
            movePlayer(currentPlayer, roll);
        }

        function getDiceEmoji(n) {
            return ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][n];
        }

        function movePlayer(playerIdx, steps) {
            let oldPos = playerPositions[playerIdx];
            let newPos = oldPos + steps;

            if (newPos >= 19) {
                newPos = 19;
                playerPositions[playerIdx] = newPos;
                updatePawn(playerIdx, newPos);
                setTimeout(() => {
                    alert(`Complimenti Giocatore ${playerIdx + 1}! Hai completato il percorso di Inclusione in ${document.getElementById('timer').innerText}`);
                    clearInterval(timerInterval);
                }, 500);
                return;
            }

            playerPositions[playerIdx] = newPos;
            updatePawn(playerIdx, newPos);

            const msg = document.getElementById('message');
            msg.innerText = `Attività: ${spiralContent[newPos].a}`;

            currentPlayer = (currentPlayer + 1) % 4;
            document.getElementById('turn-info').innerText = `Tocca al Giocatore ${currentPlayer + 1}`;
            document.getElementById('turn-info').style.backgroundColor = ['#ffb2b2','#b2f2ef','#fef0b2','#b2d1fe'][currentPlayer];
        }

        function updatePawn(playerIdx, pos) {
            const playerElement = document.getElementById(`player-${playerIdx}`);
            const targetCell = document.getElementById(`cell-${pos}`);
            targetCell.appendChild(playerElement);
        }
    </script>
</body>
</html>
